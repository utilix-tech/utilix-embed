<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilix Embed — Script Tag Example</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
  </style>
</head>
<body>
  <h1>JSON Formatter</h1>
  <p>Powered by <a href="https://utilix.tech">Utilix</a> — no configuration needed.</p>

  <!-- Declarative embed: just add the attribute -->
  <div data-utilix-tool="json-formatter"></div>

  <!-- Load the embed SDK -->
  <script src="https://cdn.utilix.tech/embed/v1/utilix-embed.min.js"></script>
</body>
</html>
