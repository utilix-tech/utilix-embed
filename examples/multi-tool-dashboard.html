<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilix Embed — Multi-tool Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #111; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card h2 { font-size: 0.85rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin: 0 0 12px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Developer Toolkit</h1>

  <div class="grid">
    <div class="card">
      <h2>JSON Formatter</h2>
      <div id="tool-json"></div>
    </div>

    <div class="card">
      <h2>Base64 Encoder</h2>
      <div id="tool-base64"></div>
    </div>

    <div class="card">
      <h2>Hash Generator</h2>
      <div id="tool-hash"></div>
    </div>

    <div class="card">
      <h2>UUID Generator</h2>
      <div id="tool-uuid"></div>
    </div>
  </div>

  <script src="https://cdn.utilix.tech/embed/v1/utilix-embed.min.js"></script>
  <script>
    const tools = [
      { id: 'tool-json',   tool: 'json-formatter' },
      { id: 'tool-base64', tool: 'base64-encoder' },
      { id: 'tool-hash',   tool: 'hash' },
      { id: 'tool-uuid',   tool: 'uuid-generator' },
    ]

    tools.forEach(({ id, tool }) => {
      UtilixEmbed.mount('#' + id, { tool, theme: 'auto', hideHeader: true })
    })
  </script>
</body>
</html>
