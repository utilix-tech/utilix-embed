<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilix Embed — Programmatic Control</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    button {
      padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px;
      background: white; cursor: pointer; font-size: 0.875rem;
    }
    button:hover { background: #f5f5f5; }
    button.primary { background: #4f46e5; color: white; border-color: #4f46e5; }
    #output-log { margin-top: 12px; font-size: 0.8rem; color: #555; font-family: monospace; }
    #tool-container { min-height: 300px; border: 1px dashed #ddd; border-radius: 8px; padding: 4px; }
  </style>
</head>
<body>
  <h1>Programmatic Control</h1>

  <div class="controls">
    <button class="primary" onclick="mountTool()">Mount</button>
    <button onclick="unmountTool()">Unmount</button>
    <button onclick="prefill()">Pre-fill Input</button>
    <button onclick="clearInput()">Clear</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <select id="tool-picker" onchange="switchTool(this.value)">
      <option value="json-formatter">JSON Formatter</option>
      <option value="base64-encoder">Base64</option>
      <option value="hash">Hash</option>
      <option value="estimate-tokens">Token Estimator</option>
      <option value="detect-pii">PII Detector</option>
    </select>
  </div>

  <div id="tool-container"></div>
  <div id="output-log"></div>

  <script src="https://cdn.utilix.tech/embed/v1/utilix-embed.min.js"></script>
  <script>
    let instance = null
    let currentTheme = 'auto'
    const log = (msg) => {
      const el = document.getElementById('output-log')
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
    }

    function mountTool(tool) {
      tool = tool || document.getElementById('tool-picker').value
      instance = UtilixEmbed.mount('#tool-container', {
        tool,
        theme: currentTheme,
        onReady: () => log(`Tool "${tool}" ready`),
        onChange: (output) => log(`Output: ${JSON.stringify(output).slice(0, 80)}`),
        onError: (err) => log(`Error: ${err.message}`),
      })
    }

    function unmountTool() {
      if (instance) { instance.unmount(); instance = null; log('Tool unmounted') }
    }

    function prefill() {
      if (!instance) return log('No tool mounted')
      instance.setInput('{"name":"Alice","age":30,"active":true}')
      log('Input pre-filled')
    }

    function clearInput() {
      if (!instance) return log('No tool mounted')
      instance.setInput('')
      log('Input cleared')
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light'
      if (instance) { instance.setTheme(currentTheme); log(`Theme → ${currentTheme}`) }
    }

    function switchTool(tool) {
      unmountTool()
      mountTool(tool)
    }

    // Mount on load
    mountTool()
  </script>
</body>
</html>
